<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Contact Us</h1>
    </header>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main>
        <h2>Send Us a Message</h2>

        <form action="#" method="post">

            <!-- Fieldset 1: Your Details -->
            <fieldset>
                <legend>Your Details</legend>

                <p>
                    <label for="name">Full Name:</label><br>
                    <input type="text" id="name" name="name" required>
                </p>

                <p>
                    <label for="email">E-mail Address:</label><br>
                    <input type="email" id="email" name="email" required>
                </p>

                <p>
                    <label for="phone">Phone Number:</label><br>
                    <input type="tel" id="phone" name="phone">
                </p>
            </fieldset>

            <!-- Fieldset 2: Your Message -->
            <fieldset>
                <legend>Your Message</legend>

                <p>
                    <label for="subject">Subject/Topic:</label><br>
                    <input type="text" id="subject" name="subject" required>
                </p>

                <p>
                    <label for="message">Message:</label><br>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </p>
            </fieldset>

            <!-- Fieldset 3: How Did You Hear About Us -->
            <fieldset>
                <legend>How did you hear about us?</legend>

                <p>
                    <input type="radio" id="search" name="referral" value="search" required>
                    <label for="search">Search Engine</label>
                </p>

                <p>
                    <input type="radio" id="social" name="referral" value="social">
                    <label for="social">Social Media</label>
                </p>

                <p>
                    <input type="radio" id="friend" name="referral" value="friend">
                    <label for="friend">Friend or Family</label>
                </p>

                <p>
                    <input type="radio" id="other" name="referral" value="other">
                    <label for="other">Other</label>
                </p>
            </fieldset>

            <!-- Submit Button -->
            <p>
                <button type="submit">Submit</button>
            </p>

        </form>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Your Company Name. All rights reserved.</p>
    </footer>

</body>
</html>
